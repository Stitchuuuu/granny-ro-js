# wtf task runner — see .devcontainer/knowledge/wtf.md in the devcontainer
# for the authoring cheat-sheet, or https://wtf.blunt.sh for canonical docs.
#
# Run from this repo's root (or any descendant — wtf walks up).

- name: test
  desc: |
    Build the image (cached after the first run) and run `docker compose
    run --rm test`. Defaults to the JS-only contract (`npm test`). Set
    TEST_COMMAND in .env to override (e.g. `npm run test:live`).

    Pass --nobuild to skip the build step when iterating.
  flags:
    - name: [nobuild, n]
      desc: Skip docker compose build (use the already-built image).
      default: false
      test: $bool
  cmd: |
    {{ if not .nobuild }}docker compose build{{ end }}
    docker compose run --rm test

- group: test
  name: js
  desc: |
    JS-only content-addressed parity test via the **host Node** runtime
    (Node 20+ required). Fastest path overall — no docker startup,
    sub-second test run.

    For the Docker equivalent (when host has no Node) : `wtf test jsdocker`.
  cmd: |
    npm run test:js

- group: test
  name: live
  desc: |
    Live wine-vs-JS parity check : runs `npm run bake` (wine +
    gr2_decompress.exe on sections), `npm run bake:textures` (wine +
    gr2_igc_export.exe on IGC), merges those outputs with JS structural
    extracts into a temp content-addressed manifest, then runs `test-js`
    against it.

    Green = JS port reproduces granny2.dll output byte-for-byte at this
    moment. ~3 min cold, seconds warm.

    Prerequisites :
      - Wine (Linux container has it ; macOS via Wine.app or brew)
      - RO_FOLDER set (data.grf + granny2.dll)

    For the JS-only smoke (no wine) : `wtf test js`.
  cmd: |
    npm run test:live

- group: test
  name: jsdocker
  desc: |
    JS-only content-addressed parity test via the **minimal alpine image**
    (~80 MB, no wine / qemu / mingw). Use this when the host doesn't have
    a Node 20+ toolchain — Docker is the only prerequisite.

    For the native host-Node equivalent : `wtf test js`.

    Pass --nobuild to skip the build step when iterating.
  flags:
    - name: [nobuild, n]
      desc: Skip docker compose build (use the already-built image).
      default: false
      test: $bool
  cmd: |
    {{ if not .nobuild }}docker compose build test-js{{ end }}
    docker compose run --rm test-js

- group: test
  name: matrix
  desc: |
    Run the JS contract check + verify any per-target rebake artifacts
    present in tests/fixtures/rebake-fresh/. Prints a ✓/⊘/✗ table per
    target. No wine needed for the JS row.
  cmd: |
    npm run test:matrix

- name: build
  desc: |
    Cross-compile shim/gr2_igc_export.c → shim/prebuilt/gr2_igc_export.exe.

    Default : host mingw-w64 (works on Linux + macOS with `brew install
    mingw-w64` + Windows with MSYS2).

    Pass --docker to build inside the heavyweight image (no host mingw
    needed).
  flags:
    - name: docker
      desc: Build via the heavyweight Docker image instead of host mingw.
      default: false
      test: $bool
  cmd: |
    {{ if .docker -}}
    docker compose run --rm build-shim
    {{- else -}}
    npm run build:shim
    {{- end }}

- name: rebake
  desc: |
    DLL parity re-bake : runs the wine + shim + granny2.dll pipeline
    against the user's data.grf + tests/fixtures/source/, writes the
    fresh manifest to tests/fixtures/rebake-fresh/<target>/manifest.json.

    Pick the target via one of the flags. Defaults to --container.

    Verify the diff against the committed content manifest with
    `wtf verify` (same flags).

    Prerequisites depend on the target :
      --container   wine 8 + qemu-i386 (devcontainer + heavy Docker image have it)
      --macos       Wine 9+ via Wine.app / Wine Staging.app / brew
      --windows     Windows native (no wine, direct exec)
    Plus RO_FOLDER set in .env (data.grf + granny2.dll).
  flags:
    - name: container
      desc: Re-bake inside the devcontainer / heavyweight Docker image.
      default: false
      test: $bool
    - name: macos
      desc: Re-bake on macOS host (runs scripts/rebake-host-macos.sh).
      default: false
      test: $bool
    - name: windows
      desc: Re-bake on Windows host (runs scripts/rebake-host-windows.ps1).
      default: false
      test: $bool
  cmd: |
    {{ if .macos -}}
    ./scripts/rebake-host-macos.sh
    {{- else if .windows -}}
    pwsh ./scripts/rebake-host-windows.ps1
    {{- else -}}
    docker compose run --rm rebake-container
    {{- end }}

- name: verify
  desc: |
    Diff tests/fixtures/rebake-fresh/<target>/manifest.json (produced by
    `wtf rebake`) element-by-element against the committed content
    manifest. Prints per-fixture per-category green / red.

    Pick the target via one of the flags. Defaults to --container.
  flags:
    - name: container
      desc: Verify the container rebake.
      default: false
      test: $bool
    - name: macos
      desc: Verify the macOS rebake (rebake-fresh/macos-host/).
      default: false
      test: $bool
    - name: windows
      desc: Verify the Windows rebake (rebake-fresh/windows-host/).
      default: false
      test: $bool
  cmd: |
    {{ if .macos -}}
    npm run verify:rebake -- --target macos-host
    {{- else if .windows -}}
    npm run verify:rebake -- --target windows-host
    {{- else -}}
    npm run verify:rebake -- --target container
    {{- end }}

- group: publish
  name: dry
  desc: |
    Inspect the npm tarball that would ship — verify the `files:`
    whitelist matches expectations (no tests / scripts / docs / shim
    leakage).
  cmd: npm publish --dry-run --tag alpha
