# granny-ro-js — portable test runner.
#
# Default `docker compose run test` runs the 80 bake-free unit tests
# against the source baked into the image. Zero host-side config.
#
# For the full live-oracle path (`npm run bake + test:live`), populate
# `.env` with RO_FOLDER pointing at your iRO ver12 client directory,
# then set TEST_COMMAND. See .env.example.
#
# Hot-dev iteration : just use `npm test` directly on the host. Docker
# is for portable validation, not live-reload — image is rebuilt on
# `docker compose build` (cached, sub-second after the first build).

services:
  # Heavyweight catch-all : full Dockerfile (wine + qemu + mingw + Python +
  # blendergranny). Defaults to `npm test` but TEST_COMMAND can drive any
  # of the rebake / bake pipelines. ~600 MB image.
  test:
    build: .
    # Read-only mount of the user's iRO client at /data so bake-all
    # can reach data.grf + granny2.dll. Defaults to /dev/null when
    # RO_FOLDER is unset (no-op mount = the bake-free path stays
    # zero-config).
    volumes:
      - ${RO_FOLDER:-/dev/null}:/data:ro
    environment:
      # In-container RO_FOLDER points at the mount target above ;
      # any host-side RO_FOLDER in .env is for compose substitution
      # only, not for the script.
      - RO_FOLDER=/data
    env_file:
      - path: .env
        required: false
    # sh -c wrapper so TEST_COMMAND can use && / pipes / shell syntax.
    # Without it, compose v2 tokenizes the string into exec argv and
    # passes `&&` as a literal arg to the first command.
    command: ["sh", "-c", "${TEST_COMMAND:-npm test}"]

  # JS-only minimal image (~80 MB, alpine + node). No wine, no DLL.
  # Primary target for day-to-day JS port iteration + perf work.
  # The committed content-manifest.json is the contract.
  test-js:
    build:
      context: .
      dockerfile: Dockerfile.js-only
    volumes:
      - ${RO_FOLDER:-/dev/null}:/data:ro
    environment:
      - RO_FOLDER=/data

  # One-shot Win32 shim cross-compile. Uses the heavyweight image (it
  # has mingw-w64) but mounts the host repo and writes the .exe back to
  # shim/prebuilt/ on the host fs — so anyone with Docker but no host
  # mingw can rebuild the shim.
  build-shim:
    build: .
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: ["sh", "-c", "i686-w64-mingw32-gcc -static -O2 -o shim/prebuilt/gr2_igc_export.exe shim/gr2_igc_export.c && echo built shim/prebuilt/gr2_igc_export.exe"]

  # DLL parity re-bake against the user's data.grf + granny2.dll inside
  # the container (wine + qemu + shim). Compares wine+DLL output vs the
  # committed manifest. Container has a known IGC divergence pattern
  # vs macOS/Windows native — see docs/HOWTO.md.
  rebake-container:
    build: .
    volumes:
      - ${RO_FOLDER:-/dev/null}:/data:ro
    environment:
      - RO_FOLDER=/data
    env_file:
      - path: .env
        required: false
    command: ["sh", "-c", "npm run rebake:container && npm run verify:rebake -- --target container"]
