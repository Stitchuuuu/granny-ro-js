# wtf task runner — see .devcontainer/knowledge/wtf.md in the devcontainer
# for the authoring cheat-sheet, or https://wtf.blunt.sh for canonical docs.
#
# Run from this repo's root (or any descendant — wtf walks up).

- group: test
  name: js
  desc: |
    JS-only content-addressed parity test. Tests JS port output element-
    by-element against the committed content-manifest.json. No wine,
    no DLL, no GRF needed.

    Default : **host Node** (Node 20+ required). Fastest path overall,
    sub-second test run.

    Pass --docker to run inside the minimal alpine image (~80 MB,
    no Node toolchain needed on the host). The first build takes ~60 s ;
    subsequent runs are cached.

    Pass --nobuild with --docker to skip the docker compose build step
    when iterating.
  flags:
    - name: docker
      desc: Run inside the minimal alpine Docker image instead of host Node.
      default: false
      test: $bool
    - name: [nobuild, n]
      desc: With --docker, skip the docker compose build step.
      default: false
      test: $bool
  cmd: |
    {{ if .docker -}}
    {{ if not .nobuild }}docker compose build test-js{{ end }}
    docker compose run --rm test-js
    {{- else -}}
    npm run test:js
    {{- end }}

- group: test
  name: docker
  desc: |
    Heavyweight Docker catch-all : `docker compose run --rm test`.
    Defaults to the JS-only contract (`npm test`). Set TEST_COMMAND in
    .env to override (e.g. `TEST_COMMAND=npm run test:live`).

    Pass --nobuild to skip the docker compose build step.
  flags:
    - name: [nobuild, n]
      desc: Skip docker compose build (use the already-built image).
      default: false
      test: $bool
  cmd: |
    {{ if not .nobuild }}docker compose build{{ end }}
    docker compose run --rm test

- group: test
  name: live
  desc: |
    Live wine-vs-JS parity check, ephemeral. Runs `npm run bake` +
    `bake:textures` (wine + DLL → fresh outputs), merges into a temp
    manifest at tests/fixtures/manifest.live.json (gitignored), then
    runs `test-js` against it. Green = JS + DLL agree byte-for-byte
    on this host RIGHT NOW. Doesn't touch the committed manifest.

    Prerequisites :
      - Wine (Linux container has it ; macOS via Wine.app or brew)
      - RO_FOLDER set (data.grf + granny2.dll)
  cmd: |
    npm run test:live

- name: build
  desc: |
    Cross-compile shim/gr2_igc_export.c → shim/prebuilt/gr2_igc_export.exe.

    Default : host mingw-w64 (works on Linux + macOS with `brew install
    mingw-w64` + Windows with MSYS2).

    Pass --docker to build inside the heavyweight image (no host mingw
    needed).
  flags:
    - name: docker
      desc: Build via the heavyweight Docker image instead of host mingw.
      default: false
      test: $bool
  cmd: |
    {{ if .docker -}}
    docker compose run --rm build-shim
    {{- else -}}
    npm run build:shim
    {{- end }}

- name: rebake
  desc: |
    Refresh the committed tests/fixtures/content-manifest.json from
    wine + DLL output on this host. Tags sourceBaseline.target with the
    detected platform ('macos-wine' | 'linux-wine' | 'windows-native').

    After a clean rebake, `git diff tests/fixtures/content-manifest.json`
    is empty IF your host's wine + DLL produces the same shas as the
    pinned reference. A non-empty diff = real DLL drift OR a host-
    specific quirk worth investigating.

    Prerequisites :
      - Wine (Linux container has it ; macOS via Wine.app or brew ;
        Windows native runs the shim direct, no wine needed)
      - RO_FOLDER set (data.grf + granny2.dll)

    Pass --container to force the linux-wine baseline via Docker even
    on a host with native wine (useful for cross-baseline checks on
    macOS or to keep the canonical reference deterministic).

    For the JS contract check (no wine needed) : `wtf verify`.
  flags:
    - name: container
      desc: Force the linux-wine baseline via `docker compose run --rm rebake`.
      default: false
      test: $bool
  cmd: |
    {{ if .container -}}
    docker compose run --rm rebake
    {{- else -}}
    npm run rebake
    {{- end }}

- name: verify
  desc: |
    Cross-check JS port vs wine + DLL on THIS host, ephemeral. Runs the
    wine bake to produce a fresh content-addressed manifest at
    tests/fixtures/manifest.live.json (gitignored, doesn't touch the
    committed reference), then runs `test-js` against it. Green = JS
    and wine + DLL agree byte-for-byte right now.

    Default : runs on host (auto-detects target — macos-wine on Mac,
    linux-wine on Linux, windows-native on Windows).

    Pass --container to force the linux-wine baseline via Docker even
    on a host with native wine.

    For the JS contract check (no wine, no DLL, just JS vs committed
    manifest) : `wtf test js`.
    For refreshing the committed manifest itself : `wtf rebake`.

    Prerequisites :
      - Wine (Linux container has it ; macOS via Wine.app or brew)
      - RO_FOLDER set (data.grf + granny2.dll)
  flags:
    - name: container
      desc: Force the linux-wine baseline via `docker compose run --rm verify`.
      default: false
      test: $bool
  cmd: |
    {{ if .container -}}
    docker compose run --rm verify
    {{- else -}}
    npm run test:live
    {{- end }}

- group: publish
  name: dry
  desc: |
    Inspect the npm tarball that would ship — verify the `files:`
    whitelist matches expectations (no tests / scripts / docs / shim
    leakage).
  cmd: npm publish --dry-run --tag alpha
