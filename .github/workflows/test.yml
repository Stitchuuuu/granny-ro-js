name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Flow 1 — public CI : the wine-free, asset-free dummy/unit suite (incl. the
      # synthetic pose goldens). The DLL-parity flows need the copyrighted client
      # assets + wine, so they run only where RO_FOLDER is available (see README).
      - run: npm run test:unit

      - run: npm run typecheck
